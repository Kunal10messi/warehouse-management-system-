{% extends 'base.html' %}
{% block content %}

<div class="card">
    <h2>Employees</h2>

    <a href="/admin-panel/users/add/" class="btn btn-primary">+ Add Employee</a>

    <br><br>

    <table class="table">
        <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Profile</th>
        </tr>

        {% for user in users %}
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.role }}</td>
            <td>
                <a href="/admin-panel/users/{{ user.id }}/" class="btn btn-secondary">View</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">No employees found</td>
        </tr>
        {% endfor %}
    </table>
</div>

{% endblock %}
